apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api
  namespace: urbanmove
  labels:
    app: user-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-api
  template:
    metadata:
      labels:
        app: user-api
    spec:
      containers:
        - name: user-api
          image: 147853513120.dkr.ecr.eu-west-3.amazonaws.com/user-api:amd64-1776522209
          ports:
            - containerPort: 4005
          env:
            - name: PORT
              value: "4005"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: REDIS_URL
            - name: ANALYTICS_URL
              valueFrom:
                configMapKeyRef:
                  name: urbanmove-config
                  key: ANALYTICS_URL
            - name: FLEET_URL
              valueFrom:
                configMapKeyRef:
                  name: urbanmove-config
                  key: FLEET_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-api
  namespace: urbanmove
spec:
  selector:
    app: user-api
  ports:
    - port: 4005
      targetPort: 4005
