apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-dashboard
  namespace: urbanmove
  labels:
    app: web-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-dashboard
  template:
    metadata:
      labels:
        app: web-dashboard
    spec:
      containers:
        - name: web-dashboard
          image: 147853513120.dkr.ecr.eu-west-3.amazonaws.com/web-dashboard:amd64-1776522209
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: web-dashboard
  namespace: urbanmove
spec:
  selector:
    app: web-dashboard
  ports:
    - port: 3000
      targetPort: 3000
