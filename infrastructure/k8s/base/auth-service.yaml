apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: urbanmove
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: 147853513120.dkr.ecr.eu-west-3.amazonaws.com/auth-service:amd64-1776522209
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: JWT_SECRET
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: urbanmove
spec:
  selector:
    app: auth-service
  ports:
    - port: 4001
      targetPort: 4001
