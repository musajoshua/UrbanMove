apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: urbanmove
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: 147853513120.dkr.ecr.eu-west-3.amazonaws.com/ingestion-service:amd64-1776522209
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: urbanmove-config
                  key: KAFKA_BROKERS
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: urbanmove
spec:
  selector:
    app: ingestion-service
  ports:
    - port: 4002
      targetPort: 4002
