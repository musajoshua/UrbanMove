apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  namespace: urbanmove
  labels:
    app: fleet-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleet-service
  template:
    metadata:
      labels:
        app: fleet-service
    spec:
      containers:
        - name: fleet-service
          image: 147853513120.dkr.ecr.eu-west-3.amazonaws.com/fleet-service:amd64-1776522209
          ports:
            - containerPort: 4004
          env:
            - name: PORT
              value: "4004"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: urbanmove-config
                  key: KAFKA_BROKERS
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: POSTGRES_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: urbanmove-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4004
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-service
  namespace: urbanmove
spec:
  selector:
    app: fleet-service
  ports:
    - port: 4004
      targetPort: 4004
