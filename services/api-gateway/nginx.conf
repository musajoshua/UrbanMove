events { worker_connections 1024; }
http {
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  upstream auth_svc { server auth-service:4001; }
  upstream ingest_svc { server ingestion-service:4002; }
  upstream analytics_svc { server analytics-service:4003; }
  upstream fleet_svc { server fleet-service:4004; }
  upstream user_api { server user-api:4005; }
  upstream dashboard { server web-dashboard:3000; }
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  server {
    listen 80;
    location /health { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
    location /api/v1/auth/ { limit_req zone=auth burst=10 nodelay; proxy_pass http://auth_svc; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/v1/events { limit_req zone=api burst=100 nodelay; client_max_body_size 5m; proxy_pass http://ingest_svc; proxy_set_header Host $host; }
    location /api/v1/ { limit_req zone=api burst=50 nodelay; proxy_pass http://user_api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws/fleet { proxy_pass http://fleet_svc; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_read_timeout 86400; }
    location / { proxy_pass http://dashboard; proxy_set_header Host $host; }
  }
}
