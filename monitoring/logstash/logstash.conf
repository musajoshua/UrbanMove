input {
  udp {
    port => 5000
    codec => json
  }
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  if [service] {
    mutate { add_field => { "[@metadata][index_suffix]" => "%{service}" } }
  } else {
    mutate { add_field => { "[@metadata][index_suffix]" => "unknown" } }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["timestamp"]
  }

  mutate {
    remove_field => ["password", "token", "secret", "authorization"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "urbanmove-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"
  }
}
