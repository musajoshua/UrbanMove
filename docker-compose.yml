services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: urbanmove
      POSTGRES_USER: urbanmove
      POSTGRES_PASSWORD: dev_password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanmove"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: urbanmove_ts
      POSTGRES_USER: urbanmove
      POSTGRES_PASSWORD: dev_password
    ports: ["5433:5432"]
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanmove"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --requirepass dev_redis_pass
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a dev_redis_pass ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports: ["9092:9092", "9094:9094"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  auth-service:
    build: ./services/auth-service
    ports: ["4001:4001"]
    environment:
      PORT: 4001
      JWT_SECRET: dev_jwt_secret_change_in_prod
      POSTGRES_URL: postgres://urbanmove:dev_password@postgres:5432/urbanmove
      REDIS_URL: redis://:dev_redis_pass@redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  ingestion-service:
    build: ./services/ingestion-service
    ports: ["4002:4002"]
    environment:
      PORT: 4002
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka: { condition: service_healthy }

  analytics-service:
    build: ./services/analytics-service
    ports: ["4003:4003"]
    environment:
      PORT: 4003
      KAFKA_BROKERS: kafka:9092
      TIMESCALEDB_URL: postgres://urbanmove:dev_password@timescaledb:5432/urbanmove_ts
      REDIS_URL: redis://:dev_redis_pass@redis:6379
    depends_on:
      kafka: { condition: service_healthy }
      timescaledb: { condition: service_healthy }
      redis: { condition: service_healthy }

  fleet-service:
    build: ./services/fleet-service
    ports: ["4004:4004"]
    environment:
      PORT: 4004
      POSTGRES_URL: postgres://urbanmove:dev_password@postgres:5432/urbanmove
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://:dev_redis_pass@redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }

  user-api:
    build: ./services/user-api
    ports: ["4005:4005"]
    environment:
      PORT: 4005
      JWT_SECRET: dev_jwt_secret_change_in_prod
      REDIS_URL: redis://:dev_redis_pass@redis:6379
      ANALYTICS_URL: http://analytics-service:4003
      FLEET_URL: http://fleet-service:4004
    depends_on:
      - auth-service
      - analytics-service
      - fleet-service

  web-dashboard:
    build: ./services/web-dashboard
    ports: ["3000:3000"]
    environment:
      VITE_API_URL: http://localhost:4005
      VITE_WS_URL: ws://localhost:4004
    depends_on:
      - user-api

  api-gateway:
    build: ./services/api-gateway
    ports: ["80:80"]
    depends_on:
      - auth-service
      - ingestion-service
      - analytics-service
      - fleet-service
      - user-api
      - web-dashboard

  prometheus:
    image: prom/prometheus:v2.51.0
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:10.4.0
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports: ["9093:9093"]
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    depends_on:
      - prometheus

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    volumes:
      - ./monitoring/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports: ["5044:5044", "5000:5000/udp"]
    depends_on:
      elasticsearch: { condition: service_healthy }

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports: ["5601:5601"]
    depends_on:
      elasticsearch: { condition: service_healthy }

volumes:
  postgres_data:
  timescale_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:
